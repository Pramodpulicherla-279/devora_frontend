<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Favicons ──────────────────────────────────────────────────── -->
    <link rel="icon"             href="/favicon.ico" />
    <link rel="icon"             type="image/png"              href="/favicon.png" />
    <link rel="icon"             type="image/png" sizes="192x192" href="/dev-el-logo-v2.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- ── Viewport ──────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="Dev.EL" />
    <meta name="author"           content="Dev.EL" />
    <meta name="theme-color"      content="#7c3aed" />

    <!-- ── Static fallback SEO (overridden per-page by useSEO hook) ──── -->
    <title>Dev.EL — Go from Beginner to Advanced Developer | Free Coding Courses</title>
    <meta name="description" content="Dev.EL transforms beginners into advanced developers with free interactive courses in HTML, CSS, JavaScript, React, Node.js, SQL, Git, and more — with live coding, AI tutoring, quizzes, and roadmaps." />
    <meta name="keywords"    content="learn coding for beginners, beginner to advanced developer, free coding courses, web development courses, HTML CSS JavaScript, React course, Node.js course, SQL tutorial, Git tutorial, programming roadmap, become a developer, learn programming online, interactive coding, developer roadmaps, full stack developer" />
    <meta name="robots"      content="index,follow,max-snippet:-1,max-image-preview:large" />

    <!-- ── Canonical (homepage fallback — overridden per-page) ───────── -->
    <link rel="canonical" href="https://www.dev-el.co/" />

    <!-- ── Open Graph ────────────────────────────────────────────────── -->
    <meta property="og:site_name"   content="Dev.EL" />
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Dev.EL — Go from Beginner to Advanced Developer for Free" />
    <meta property="og:description" content="Transform your coding journey from zero to advanced developer. Free interactive courses in HTML, CSS, JavaScript, React, Node.js, SQL, Git, and more — with live coding and AI tutoring." />
    <meta property="og:image"       content="https://www.dev-el.co/dev-el-logo-v2.png" />
    <meta property="og:url"         content="https://www.dev-el.co" />

    <!-- ── Twitter / X Card ──────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Dev.EL — Go from Beginner to Advanced Developer for Free" />
    <meta name="twitter:description" content="Transform from beginner to advanced developer with free courses in HTML, CSS, JavaScript, React, Node.js, SQL, Git, and more. Live coding + AI tutor included." />
    <meta name="twitter:image"       content="https://www.dev-el.co/dev-el-logo-v2.png" />

    <!-- ── Google Search Console verification ────────────────────────── -->
    <!-- Replace YOUR_GSC_CODE with the value from GSC → HTML tag method -->
    <!-- <meta name="google-site-verification" content="YOUR_GSC_CODE" /> -->

    <!-- ── Google Fonts (preconnect for speed, then load) ────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- ── Static JSON-LD: EducationalOrganization (site-wide fallback) ─ -->
    <!-- Per-page schemas (LearningResource, FAQPage, Course, etc.) are   -->
    <!-- injected dynamically by the useSEO hook at runtime.              -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "EducationalOrganization",
          "@id":   "https://www.dev-el.co/#org",
          "name":  "Dev.EL",
          "url":   "https://www.dev-el.co",
          "logo": {
            "@type":  "ImageObject",
            "url":    "https://www.dev-el.co/dev-el-logo-v2.png",
            "width":  192,
            "height": 192
          },
          "description": "Dev.EL transforms beginners into advanced developers with free interactive courses in HTML, CSS, JavaScript, React, Node.js, SQL, Git, and more — with live coding, AI tutoring, quizzes, and roadmaps.",
          "sameAs": ["https://www.dev-el.co"]
        },
        {
          "@type": "WebSite",
          "@id":   "https://www.dev-el.co/#website",
          "url":   "https://www.dev-el.co",
          "name":  "Dev.EL",
          "publisher": { "@id": "https://www.dev-el.co/#org" },
          "potentialAction": {
            "@type":       "SearchAction",
            "target": {
              "@type":      "EntryPoint",
              "urlTemplate":"https://www.dev-el.co/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "ItemList",
          "@id":   "https://www.dev-el.co/#site-navigation",
          "name":  "Dev.EL — Free Coding Courses",
          "itemListElement": [
            {
              "@type":    "SiteNavigationElement",
              "position": 1,
              "name":     "HTML Course — Free",
              "description": "Learn HTML from scratch — structure, tags, semantic markup, and forms.",
              "url":      "https://www.dev-el.co/course/html/introduction-to-html"
            },
            {
              "@type":    "SiteNavigationElement",
              "position": 2,
              "name":     "CSS Course — Free",
              "description": "Master CSS — selectors, flexbox, grid, animations, and responsive design.",
              "url":      "https://www.dev-el.co/course/css/css-get-started"
            },
            {
              "@type":    "SiteNavigationElement",
              "position": 3,
              "name":     "JavaScript Course — Free",
              "description": "Learn JavaScript from variables to async — the language of the web.",
              "url":      "https://www.dev-el.co/course/javascript/variables-data-types"
            },
            {
              "@type":    "SiteNavigationElement",
              "position": 4,
              "name":     "Node.js & Express Course — Free",
              "description": "Build REST APIs and backend servers with Node.js and Express.",
              "url":      "https://www.dev-el.co/course/backend-nodejs-express/introduction-to-nodejs-and-node-repl"
            },
            {
              "@type":    "SiteNavigationElement",
              "position": 5,
              "name":     "SQL Course — Free",
              "description": "Master SQL — queries, joins, aggregations, and database design.",
              "url":      "https://www.dev-el.co/course/sql/every-app-runs-on-a-database"
            },
            {
              "@type":    "SiteNavigationElement",
              "position": 6,
              "name":     "Git & GitHub Course — Free",
              "description": "Learn version control, branching, and collaboration with Git and GitHub.",
              "url":      "https://www.dev-el.co/course/git-and-github/introduction-to-git-and-github-version-control-essentials"
            },
            {
              "@type":    "SiteNavigationElement",
              "position": 7,
              "name":     "Developer Roadmaps",
              "description": "Step-by-step learning roadmaps — from beginner to job-ready developer.",
              "url":      "https://www.dev-el.co/roadmaps"
            }
          ]
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Google AdSense -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3983165432103513"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
