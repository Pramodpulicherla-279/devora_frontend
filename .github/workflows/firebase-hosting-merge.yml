# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:      ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEVEL_350 }}
        run: |
          echo "$FIREBASE_SA_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json

          # firebase-tools v15 exits 1 when the live channel already has this
          # exact build (400 "current active version"). That is not a real failure
          # — the site is already up-to-date. Any other non-zero exit is a real
          # error and should still fail the workflow.
          set +e
          npx firebase-tools@latest deploy --only hosting --project devel-350 \
            2>&1 | tee /tmp/deploy_out.txt
          DEPLOY_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$DEPLOY_EXIT" -ne 0 ] && \
             grep -q "current active version" /tmp/deploy_out.txt; then
            echo "✓ Production site is already up-to-date — same build already live."
            exit 0
          fi

          exit "$DEPLOY_EXIT"
